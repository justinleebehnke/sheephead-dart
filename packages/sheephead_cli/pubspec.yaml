name: sheephead_cli
description: Terminal harness for playing Sheephead via the engine.
version: 0.1.0
publish_to: none

environment:
  sdk: ^3.6.0

resolution: workspace

dependencies:
  # Resolved locally from the workspace — no path: needed. `any` is fine here
  # because workspace members always resolve together as one unit.
  sheephead_engine: any

dev_dependencies:
  lints: ^4.0.0
  test: ^1.24.0
