name: CI

# Trunk-based: we commit straight to main. This pipeline is the authoritative
# verification that main is green on a clean checkout. A red run here is a
# stop-the-line event — fixing it comes before any new work.
on:
  push:
    branches: [main]
  workflow_dispatch: # allow manual runs from the Actions tab

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: "3.12.2"

      - name: Resolve workspace dependencies
        run: dart pub get

      - name: Check formatting (strict — fails on any unformatted file)
        run: dart format --output none --set-exit-if-changed .

      - name: Analyze (errors, warnings, and infos are all fatal)
        run: dart analyze --fatal-infos --fatal-warnings

      - name: Test every package
        run: |
          for pkg in packages/*/; do
            if [ -d "${pkg}test" ]; then
              echo "== $pkg =="
              (cd "$pkg" && dart test)
            fi
          done
